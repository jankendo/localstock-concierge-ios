name: iOS unsigned build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      GIT_LFS_SKIP_SMUDGE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode versions
        run: |
          ls -1 /Applications | grep -E '^Xcode' || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Disable Git LFS smudge for SwiftPM checkouts
        run: |
          git lfs install --skip-smudge || true
          git config --global filter.lfs.smudge "git-lfs smudge --skip -- %f" || true
          git config --global filter.lfs.process "git-lfs filter-process --skip" || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild \
            -project LocalStockConcierge.xcodeproj \
            -scheme LocalStockConcierge \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath SourcePackages \
            -resolvePackageDependencies

      - name: Patch LiteRT-LM package manifest for app integration
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("SourcePackages/checkouts/LiteRT-LM/Package.swift")
          text = manifest.read_text()
          text = text.replace(
              '      linkerSettings: [\n        .unsafeFlags(["-Xlinker", "-all_load"])\n      ]',
              '      linkerSettings: []'
          )
          manifest.write_text(text)
          PY
          ! grep -R "unsafeFlags" SourcePackages/checkouts/LiteRT-LM/Package.swift

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project LocalStockConcierge.xcodeproj \
            -scheme LocalStockConcierge \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath SourcePackages \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/LocalStockConcierge.app"
          test -d "$APP_PATH"
          rm -rf Payload artifacts
          mkdir -p Payload artifacts
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry artifacts/LocalStockConcierge-unsigned.ipa Payload
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "Payload/LocalStockConcierge.app/Info.plist"
          test -f artifacts/LocalStockConcierge-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalStockConcierge-unsigned-ipa
          path: artifacts/LocalStockConcierge-unsigned.ipa
          if-no-files-found: error
