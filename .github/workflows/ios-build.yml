name: iOS unsigned build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode versions
        run: |
          ls -1 /Applications | grep -E '^Xcode' || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild \
            -project LocalStockConcierge.xcodeproj \
            -scheme LocalStockConcierge \
            -resolvePackageDependencies

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project LocalStockConcierge.xcodeproj \
            -scheme LocalStockConcierge \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/LocalStockConcierge.app"
          test -d "$APP_PATH"
          rm -rf Payload artifacts
          mkdir -p Payload artifacts
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry artifacts/LocalStockConcierge-unsigned.ipa Payload
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "Payload/LocalStockConcierge.app/Info.plist"
          test -f artifacts/LocalStockConcierge-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalStockConcierge-unsigned-ipa
          path: artifacts/LocalStockConcierge-unsigned.ipa
          if-no-files-found: error
